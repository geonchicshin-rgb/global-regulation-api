name: Daily AI Data Harvester

on:
  schedule:
    - cron: '0 18 * * *' # 매일 한국 시간 새벽 3시(UTC 18시) 자동 실행
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
      
    permissions:
      contents: write 

    steps:
      - name: 1. 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. 파이썬 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 2026년 표준인 3.11로 업그레이드

      - name: 3. 2026년형 최신 라이브러리 설치 (requirements.txt 기준)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. AI 가동! (3대 규제 사냥 및 분석)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: 5. 완성된 데이터를 깃허브에 저장(Commit & Push)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add global_esg_live.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 AI Data Auto-Update: 3대 규제 딥다이브 완료" && git push)
