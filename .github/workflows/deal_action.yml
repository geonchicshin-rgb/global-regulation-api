name: Global Hot Deal Sniper (Factory 3)

on:
  schedule:
    - cron: '30 21 * * *' # 매일 아침 6시 30분 (KST 기준)에 자동 실행
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai requests

      - name: Run Deal Sniper Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python deal_bot.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add global_hot_deals.json
          git commit -m "Auto-update Global Hot Deals" || echo "No changes to commit"
          git push
