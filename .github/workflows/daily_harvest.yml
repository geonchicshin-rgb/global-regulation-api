# .github/workflows/daily_harvest.yml
# =====================================================================
# B2A Oracle — Automated Market Data Harvester (AI-Powered)
# =====================================================================

name: B2A Market Data Harvest

on:
  schedule:
    - cron: "0 */4 * * *"   # 4시간마다 자동 실행
  workflow_dispatch:        # 수동 실행 버튼
    inputs:
      reason:
        description: "Reason for manual run"
        required: false
        default: "Manual test harvest"

jobs:
  harvest:
    name: Harvest Market Data
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 결과물 저장을 위한 쓰기 권한

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run auto_collector.py
        env:
          # 🔐 깃허브 금고(Secrets)에서 열쇠를 꺼내 AI 엔진에 주입합니다.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
        run: python auto_collector.py

      - name: Commit and Push results
        run: |
          git config --global user.name  "B2A Oracle Bot"
          git config --global user.email "oracle-bot@b2a-oracle.github"
          
          # 새로 생성된 모든 데이터 파일을 추적합니다.
          git add .
          
          # 변경사항이 있을 때만 기록을 남깁니다.
          if git diff --staged --quiet; then
            echo "No data changes detected."
          else
            git commit -m "🤖 AI Data Auto-Update: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
