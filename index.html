<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글로벌 ESG 규제 동향 대시보드</title>
    <style>
        /* 웹사이트 디자인 (CSS) */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            color: #1a365d;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .header p {
            color: #4a5568;
            font-size: 1.1rem;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            border-top: 5px solid #3182ce;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }
        .category {
            display: inline-block;
            background-color: #ebf8ff;
            color: #2b6cb0;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .section-title {
            font-size: 0.95rem;
            color: #718096;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .content {
            font-size: 0.95rem;
            color: #2d3748;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        .warning {
            background-color: #fffaf0;
            border-left: 4px solid #dd6b20;
            padding: 10px;
            font-size: 0.9rem;
            color: #9c4221;
        }
        .footer {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #a0aec0;
        }
        .read-more {
            text-decoration: none;
            color: #3182ce;
            font-weight: bold;
        }
        .read-more:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌐 글로벌 ESG 규제 AI 추적기</h1>
        <p>CBAM, CSDDD, EUDR 등 한국 수출 기업을 위한 실시간 핵심 규제 동향</p>
    </div>

    <div class="dashboard" id="news-container">
        <!-- 데이터가 여기에 자동으로 들어갑니다 -->
    </div>

    <script>
        // 창고(JSON)에서 데이터를 가져와서 화면에 뿌려주는 자바스크립트 로직
        fetch('./global_esg_live.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('news-container');
                
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    // 카테고리가 없는 예전 데이터 예외 처리
                    const category = item.regulation_category ? item.regulation_category : "글로벌 ESG 동향";
                    const date = new Date(item.published_date).toLocaleDateString();

                    card.innerHTML = `
                        <div class="category">${category}</div>
                        <div class="title">${item.source_title}</div>
                        
                        <div class="section-title">📊 글로벌 규제 동향</div>
                        <div class="content">${item.global_regulation_trend}</div>
                        
                        <div class="section-title">🚨 한국 기업 대응 전략</div>
                        <div class="warning content">${item.warning_for_KR_business}</div>
                        
                        <div class="footer">
                            <span>발행일: ${date}</span>
                            <a href="${item.original_link}" target="_blank" class="read-more">기사 원문 보기 →</a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(error => {
                console.error('데이터를 불러오는 중 오류 발생:', error);
                document.getElementById('news-container').innerHTML = '<p style="text-align:center; width:100%;">데이터를 불러올 수 없습니다. 잠시 후 다시 시도해주세요.</p>';
            });
    </script>
</body>
</html>
